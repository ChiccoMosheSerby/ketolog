# Render Blueprint — deploy KetoLog as a single web service.
# In Render: New + → Blueprint → connect this repo. Then set the secret env
# vars (MONGODB_URI, ANTHROPIC_API_KEY, and OPENAI_API_KEY for voice input)
# in the dashboard.
services:
  - type: web
    name: ketolog
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false # set in dashboard (MongoDB Atlas connection string)
      - key: ANTHROPIC_API_KEY
        sync: false # set in dashboard (sk-ant-...)
      - key: OPENAI_API_KEY
        sync: false # set in dashboard (sk-...) — voice-input transcription
      - key: TRANSCRIBE_MODEL
        value: whisper-1 # speech-to-text model for the mic button (best Hebrew short-clip)
      - key: JWT_SECRET
        generateValue: true # Render generates a secure random value
      - key: CLAUDE_MODEL
        value: claude-opus-4-8 # log calculator (meal/image/barcode estimation)
      - key: CHAT_MODEL
        value: claude-opus-4-8 # conversational keto assistant
      # New-user approval: emails an approval link to ADMIN_EMAIL. APP_URL is
      # intentionally omitted so the code defaults to the deployed Render URL.
      - key: ADMIN_EMAIL
        value: chiccomoshe@gmail.com
      # Email delivery. Render's free tier blocks outbound SMTP (ports 25/465/587),
      # so production sends via Brevo's HTTPS API instead. Set BREVO_API_KEY in the
      # dashboard; when present it takes precedence over the SMTP_* vars below
      # (which remain for local dev, where SMTP isn't blocked).
      - key: BREVO_API_KEY
        sync: false # set in dashboard (Brevo API key, starts with xkeysib-)
      - key: BREVO_SENDER_EMAIL
        value: chiccomoshe@gmail.com # must be a verified sender in Brevo
      - key: BREVO_SENDER_NAME
        value: KetoLog
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: chiccomoshe@gmail.com
      - key: SMTP_PASS
        sync: false # set in dashboard (Gmail 16-char App Password)
      # WhatsApp meal logging (Twilio). Text a meal to the sandbox number and it
      # is calculated + logged, with a receipt reply. Secrets set in dashboard.
      - key: TWILIO_ACCOUNT_SID
        sync: false # set in dashboard (AC...)
      - key: TWILIO_AUTH_TOKEN
        sync: false # set in dashboard (validates inbound webhook signatures)
      # Recommended API key for outbound sends (account Auth Token auto-resets).
      - key: TWILIO_API_KEY_SID
        sync: false # set in dashboard (SK...)
      - key: TWILIO_API_KEY_SECRET
        sync: false # set in dashboard (shown once at key creation)
      - key: TWILIO_WHATSAPP_FROM
        value: whatsapp:+14155238886 # Twilio WhatsApp sandbox sender
      - key: WHATSAPP_WEBHOOK_URL
        value: https://ketolog.onrender.com/api/whatsapp/inbound
